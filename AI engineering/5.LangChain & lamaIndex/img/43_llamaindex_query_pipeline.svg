<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, sans-serif; fill: #1f2937; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; fill: #6b7280; }
    .box-gray   { fill: #f3f4f6; stroke: #d1d5db; }
    .box-purple { fill: #ede9fe; stroke: #7c3aed; }
    .box-teal   { fill: #ccfbf1; stroke: #0d9488; }
    .box-coral  { fill: #fee2e2; stroke: #dc2626; }
    .box-blue   { fill: #dbeafe; stroke: #2563eb; }
    .text-purple { fill: #4c1d95; }
    .text-teal   { fill: #134e4a; }
    .text-coral  { fill: #7f1d1d; }
    .text-blue   { fill: #1e3a8a; }
    .text-gray   { fill: #374151; }
    .sub-purple  { fill: #6d28d9; }
    .sub-teal    { fill: #0f766e; }
    .sub-coral   { fill: #b91c1c; }
    .sub-blue    { fill: #1d4ed8; }
  </style>
</defs>

<!-- Title -->
<text class="th" x="340" y="30" text-anchor="middle" style="font-size:15px;fill:#111827">LlamaIndex query pipeline — DAG</text>

<!-- Row 1: Input -->
<rect class="box-gray" x="270" y="55" width="140" height="44" rx="8" stroke-width="0.5"/>
<text class="th text-gray" x="340" y="78" text-anchor="middle" dominant-baseline="central">User query</text>

<!-- Arrows from Input -->
<path d="M310 99 L240 148" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.6" marker-end="url(#arrow)"/>
<path d="M390 99 Q490 120 490 148" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="468" y="128" text-anchor="middle">query_str</text>

<!-- Row 2: Query Rewriter -->
<rect class="box-purple" x="140" y="148" width="180" height="52" rx="8" stroke-width="0.5"/>
<text class="th text-purple" x="230" y="168" text-anchor="middle" dominant-baseline="central">Query rewriter</text>
<text class="ts sub-purple" x="230" y="186" text-anchor="middle" dominant-baseline="central">Expands &amp; clarifies</text>

<!-- Rewriter → Retriever -->
<path d="M230 200 L230 248" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.6" marker-end="url(#arrow)"/>

<!-- Row 3: Retriever -->
<rect class="box-teal" x="140" y="248" width="180" height="52" rx="8" stroke-width="0.5"/>
<text class="th text-teal" x="230" y="268" text-anchor="middle" dominant-baseline="central">Retriever</text>
<text class="ts sub-teal" x="230" y="286" text-anchor="middle" dominant-baseline="central">Top-k from vector index</text>

<!-- Retriever → Re-ranker -->
<path d="M230 300 L230 348" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.6" marker-end="url(#arrow)"/>

<!-- Row 4: Re-ranker -->
<rect class="box-coral" x="140" y="348" width="180" height="52" rx="8" stroke-width="0.5"/>
<text class="th text-coral" x="230" y="368" text-anchor="middle" dominant-baseline="central">Re-ranker</text>
<text class="ts sub-coral" x="230" y="386" text-anchor="middle" dominant-baseline="central">Cross-encoder top-n</text>

<!-- Re-ranker → Synthesizer (nodes) -->
<path d="M320 374 Q420 374 420 348" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="388" y="367" text-anchor="middle">nodes</text>

<!-- Synthesizer (right column) -->
<rect class="box-blue" x="380" y="248" width="190" height="52" rx="8" stroke-width="0.5"/>
<text class="th text-blue" x="475" y="268" text-anchor="middle" dominant-baseline="central">Synthesizer</text>
<text class="ts sub-blue" x="475" y="286" text-anchor="middle" dominant-baseline="central">Generates final answer</text>

<!-- Synthesizer → Output -->
<path d="M475 300 L475 420 Q475 430 465 430 L410 430" fill="none" stroke="#6b7280" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

<!-- Row 5: Output -->
<rect class="box-gray" x="270" y="418" width="140" height="44" rx="8" stroke-width="0.5"/>
<text class="th text-gray" x="340" y="440" text-anchor="middle" dominant-baseline="central">Response</text>

<!-- Optional Router -->
<rect x="30" y="248" width="90" height="52" rx="8" fill="none" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="5 3"/>
<text class="ts" x="75" y="268" text-anchor="middle" dominant-baseline="central" style="fill:#9ca3af">Router</text>
<text class="ts" x="75" y="286" text-anchor="middle" dominant-baseline="central" style="fill:#9ca3af">optional</text>
<path d="M120 274 L138 274" fill="none" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Legend -->
<text class="ts" x="30" y="490" style="fill:#9ca3af">Solid = data flow</text>
<text class="ts" x="200" y="490" style="fill:#9ca3af">Dashed = pass-through (query_str)</text>
<text class="ts" x="470" y="490" style="fill:#9ca3af">Router = optional</text>
</svg>
