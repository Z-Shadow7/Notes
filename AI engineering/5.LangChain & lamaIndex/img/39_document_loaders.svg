<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="24" text-anchor="middle" fill="#2C2C2A">Document loading and splitting pipeline</text>
<text font-family="sans-serif" font-size="12" x="340" y="46" text-anchor="middle" fill="#888780">Step 1 — Load raw sources into Document objects</text>

<rect x="40" y="56" width="88" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="84" y="74" text-anchor="middle" fill="#2C2C2A">PDF</text>
<text font-family="sans-serif" font-size="11" x="84" y="92" text-anchor="middle" fill="#5F5E5A">PyPDF</text>

<rect x="138" y="56" width="88" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="182" y="74" text-anchor="middle" fill="#2C2C2A">Web</text>
<text font-family="sans-serif" font-size="11" x="182" y="92" text-anchor="middle" fill="#5F5E5A">WebBase</text>

<rect x="236" y="56" width="88" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="280" y="74" text-anchor="middle" fill="#2C2C2A">CSV</text>
<text font-family="sans-serif" font-size="11" x="280" y="92" text-anchor="middle" fill="#5F5E5A">CSVLoader</text>

<rect x="334" y="56" width="88" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="378" y="74" text-anchor="middle" fill="#2C2C2A">DOCX</text>
<text font-family="sans-serif" font-size="11" x="378" y="92" text-anchor="middle" fill="#5F5E5A">Docx2txt</text>

<rect x="432" y="56" width="88" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="476" y="74" text-anchor="middle" fill="#2C2C2A">JSON</text>
<text font-family="sans-serif" font-size="11" x="476" y="92" text-anchor="middle" fill="#5F5E5A">JSONLoader</text>

<rect x="530" y="56" width="110" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="585" y="74" text-anchor="middle" fill="#2C2C2A">100+ more</text>
<text font-family="sans-serif" font-size="11" x="585" y="92" text-anchor="middle" fill="#5F5E5A">GitHub, YT, DB…</text>

<line x1="340" y1="108" x2="340" y2="136" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="160" y="138" width="360" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="158" text-anchor="middle" fill="#26215C">Document objects</text>
<text font-family="sans-serif" font-size="11" x="340" y="176" text-anchor="middle" fill="#3C3489">page_content: "text..."  |  metadata: {source, page, url, date...}</text>

<line x1="340" y1="190" x2="340" y2="218" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="340" y="214" text-anchor="middle" fill="#888780">Step 2 — Split into chunks</text>

<rect x="80" y="220" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="180" y="240" text-anchor="middle" fill="#085041">RecursiveCharSplitter</text>
<text font-family="sans-serif" font-size="11" x="180" y="258" text-anchor="middle" fill="#0F6E56">best default — respects structure</text>

<rect x="300" y="220" width="160" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="380" y="240" text-anchor="middle" fill="#4A1B0C">TokenTextSplitter</text>
<text font-family="sans-serif" font-size="11" x="380" y="258" text-anchor="middle" fill="#712B13">splits on token count</text>

<rect x="480" y="220" width="160" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="560" y="240" text-anchor="middle" fill="#412402">MarkdownSplitter</text>
<text font-family="sans-serif" font-size="11" x="560" y="258" text-anchor="middle" fill="#633806">splits on headers</text>

<line x1="340" y1="272" x2="340" y2="300" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="100" y="302" width="480" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="322" text-anchor="middle" fill="#26215C">Smaller Document chunks (with preserved metadata)</text>
<text font-family="sans-serif" font-size="11" x="340" y="342" text-anchor="middle" fill="#3C3489">page_content: "chunk text"  |  metadata: {source, page, chunk_index...}</text>

<line x1="340" y1="354" x2="340" y2="382" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="340" y="378" text-anchor="middle" fill="#888780">Step 3 — Embed and store</text>

<rect x="160" y="384" width="360" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="404" text-anchor="middle" fill="#412402">Vector store</text>
<text font-family="sans-serif" font-size="11" x="340" y="422" text-anchor="middle" fill="#633806">Chroma / Pinecone / Qdrant — embed + index each chunk</text>
</svg>
