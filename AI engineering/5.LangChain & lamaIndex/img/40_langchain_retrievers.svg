<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="24" text-anchor="middle" fill="#2C2C2A">LangChain retriever types</text>
<rect x="240" y="40" width="200" height="36" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="340" y="62" text-anchor="middle" fill="#412402">query: str → list[Document]</text>
<line x1="290" y1="76" x2="145" y2="110" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="315" y1="76" x2="290" y2="110" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="340" y1="76" x2="425" y2="110" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="365" y1="76" x2="545" y2="110" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="390" y1="76" x2="637" y2="110" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="80" y="112" width="130" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="145" y="132" text-anchor="middle" fill="#26215C">VectorStore</text>
<text font-family="sans-serif" font-size="11" x="145" y="150" text-anchor="middle" fill="#3C3489">cosine similarity</text>
<rect x="225" y="112" width="130" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="290" y="132" text-anchor="middle" fill="#085041">MultiQuery</text>
<text font-family="sans-serif" font-size="11" x="290" y="150" text-anchor="middle" fill="#0F6E56">generates variants</text>
<rect x="370" y="112" width="110" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="425" y="132" text-anchor="middle" fill="#4A1B0C">Ensemble</text>
<text font-family="sans-serif" font-size="11" x="425" y="150" text-anchor="middle" fill="#712B13">RRF fusion</text>
<rect x="490" y="112" width="110" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="545" y="132" text-anchor="middle" fill="#412402">Contextual</text>
<text font-family="sans-serif" font-size="11" x="545" y="150" text-anchor="middle" fill="#633806">compression</text>
<rect x="610" y="112" width="60" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="640" y="132" text-anchor="middle" fill="#042C53">Self</text>
<text font-family="sans-serif" font-size="11" x="640" y="150" text-anchor="middle" fill="#0C447C">query</text>
<line x1="40" y1="188" x2="640" y2="188" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="40" y="208" fill="#2C2C2A">Retriever details</text>
<rect x="40" y="220" width="290" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="185" y="240" text-anchor="middle" fill="#26215C">VectorStoreRetriever</text>
<text font-family="sans-serif" font-size="11" x="185" y="258" text-anchor="middle" fill="#3C3489">as_retriever(search_type, k)</text>
<text font-family="sans-serif" font-size="11" x="185" y="274" text-anchor="middle" fill="#534AB7">similarity / mmr / threshold</text>
<rect x="350" y="220" width="290" height="64" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="495" y="240" text-anchor="middle" fill="#085041">MultiQueryRetriever</text>
<text font-family="sans-serif" font-size="11" x="495" y="258" text-anchor="middle" fill="#0F6E56">LLM generates 3–5 query variants</text>
<text font-family="sans-serif" font-size="11" x="495" y="274" text-anchor="middle" fill="#1D9E75">retrieves for each, deduplicates</text>
<rect x="40" y="300" width="290" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="185" y="320" text-anchor="middle" fill="#4A1B0C">EnsembleRetriever</text>
<text font-family="sans-serif" font-size="11" x="185" y="338" text-anchor="middle" fill="#712B13">combines N retrievers with weights</text>
<text font-family="sans-serif" font-size="11" x="185" y="354" text-anchor="middle" fill="#993C1D">uses RRF fusion by default</text>
<rect x="350" y="300" width="290" height="64" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="495" y="320" text-anchor="middle" fill="#412402">ContextualCompressionRetriever</text>
<text font-family="sans-serif" font-size="11" x="495" y="338" text-anchor="middle" fill="#633806">wraps any retriever</text>
<text font-family="sans-serif" font-size="11" x="495" y="354" text-anchor="middle" fill="#854F0B">compresses chunks after retrieval</text>
<rect x="40" y="380" width="290" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="185" y="400" text-anchor="middle" fill="#042C53">SelfQueryRetriever</text>
<text font-family="sans-serif" font-size="11" x="185" y="418" text-anchor="middle" fill="#0C447C">LLM parses query into filters</text>
<text font-family="sans-serif" font-size="11" x="185" y="434" text-anchor="middle" fill="#185FA5">"2024 refund docs" → filter + search</text>
<rect x="350" y="380" width="290" height="64" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="495" y="400" text-anchor="middle" fill="#2C2C2A">ParentDocumentRetriever</text>
<text font-family="sans-serif" font-size="11" x="495" y="418" text-anchor="middle" fill="#5F5E5A">matches small child chunks</text>
<text font-family="sans-serif" font-size="11" x="495" y="434" text-anchor="middle" fill="#888780">returns large parent context</text>
</svg>
