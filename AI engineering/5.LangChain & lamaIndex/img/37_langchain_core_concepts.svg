<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="24" text-anchor="middle" fill="#2C2C2A">LangChain core abstractions</text>

<rect x="40" y="44" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="120" y="64" text-anchor="middle" fill="#412402">1. Models</text>
<text font-family="sans-serif" font-size="12" x="120" y="82" text-anchor="middle" fill="#633806">ChatGroq, ChatOpenAI</text>
<text font-family="sans-serif" font-size="11" x="120" y="96" text-anchor="middle" fill="#854F0B">swap provider in 1 line</text>

<rect x="220" y="44" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="300" y="64" text-anchor="middle" fill="#26215C">2. Prompts</text>
<text font-family="sans-serif" font-size="12" x="300" y="82" text-anchor="middle" fill="#3C3489">PromptTemplate</text>
<text font-family="sans-serif" font-size="11" x="300" y="96" text-anchor="middle" fill="#534AB7">separate instructions from vars</text>

<rect x="400" y="44" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="480" y="64" text-anchor="middle" fill="#085041">3. Output parsers</text>
<text font-family="sans-serif" font-size="12" x="480" y="82" text-anchor="middle" fill="#0F6E56">StrOutputParser</text>
<text font-family="sans-serif" font-size="11" x="480" y="96" text-anchor="middle" fill="#1D9E75">JSON, Pydantic, string</text>

<line x1="200" y1="72" x2="218" y2="72" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="380" y1="72" x2="398" y2="72" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="340" y="124" text-anchor="middle" fill="#888780">prompt | model | parser  ←  a chain (LCEL syntax)</text>

<line x1="40" y1="136" x2="640" y2="136" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>

<rect x="40" y="150" width="180" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="130" y="170" text-anchor="middle" fill="#4A1B0C">4. Memory</text>
<text font-family="sans-serif" font-size="12" x="130" y="188" text-anchor="middle" fill="#712B13">ConversationBufferMemory</text>
<text font-family="sans-serif" font-size="11" x="130" y="204" text-anchor="middle" fill="#993C1D">stores chat history</text>

<rect x="250" y="150" width="180" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="170" text-anchor="middle" fill="#042C53">5. Retrievers</text>
<text font-family="sans-serif" font-size="12" x="340" y="188" text-anchor="middle" fill="#0C447C">VectorStoreRetriever</text>
<text font-family="sans-serif" font-size="11" x="340" y="204" text-anchor="middle" fill="#185FA5">query → relevant docs</text>

<rect x="460" y="150" width="180" height="64" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="550" y="170" text-anchor="middle" fill="#2C2C2A">6. Agents</text>
<text font-family="sans-serif" font-size="12" x="550" y="188" text-anchor="middle" fill="#5F5E5A">LLM decides tool use</text>
<text font-family="sans-serif" font-size="11" x="550" y="204" text-anchor="middle" fill="#888780">covered in Section 6</text>

<line x1="40" y1="238" x2="640" y2="238" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="40" y="260" fill="#2C2C2A">How a chain is built — LCEL pipe syntax</text>

<rect x="40" y="274" width="110" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="95" y="294" text-anchor="middle" fill="#26215C">Prompt</text>
<text font-family="sans-serif" font-size="11" x="95" y="308" text-anchor="middle" fill="#3C3489">template</text>

<line x1="150" y1="296" x2="168" y2="296" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="170" y="274" width="110" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="225" y="294" text-anchor="middle" fill="#412402">Model</text>
<text font-family="sans-serif" font-size="11" x="225" y="308" text-anchor="middle" fill="#633806">ChatGroq</text>

<line x1="280" y1="296" x2="298" y2="296" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="300" y="274" width="110" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="355" y="294" text-anchor="middle" fill="#085041">Parser</text>
<text font-family="sans-serif" font-size="11" x="355" y="308" text-anchor="middle" fill="#0F6E56">StrOutputParser</text>

<line x1="410" y1="296" x2="428" y2="296" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="430" y="274" width="210" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="535" y="290" text-anchor="middle" fill="#4A1B0C">chain.invoke({"topic": "RAG"})</text>
<text font-family="sans-serif" font-size="11" x="535" y="308" text-anchor="middle" fill="#712B13">returns string answer</text>

<line x1="40" y1="340" x2="640" y2="340" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="40" y="362" fill="#2C2C2A">Key advantage — provider swapping</text>

<rect x="40" y="376" width="600" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="340" y="396" text-anchor="middle" fill="#2C2C2A">from langchain_groq import ChatGroq  →  from langchain_openai import ChatOpenAI</text>
<text font-family="sans-serif" font-size="12" x="340" y="416" text-anchor="middle" fill="#5F5E5A">swap one line — rest of the chain is completely unchanged</text>
</svg>
