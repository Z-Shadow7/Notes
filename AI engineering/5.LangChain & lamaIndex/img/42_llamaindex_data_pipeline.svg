<text font-family="sans-serif" font-size="11" x="425" y="388" text-anchor="middle" fill="#633806">BM25 search</text>

<rect x="510" y="352" width="130" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
