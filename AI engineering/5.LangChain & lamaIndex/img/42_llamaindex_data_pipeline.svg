<text font-family="sans-serif" font-size="11" x="575" y="388" text-anchor="middle" fill="#712B13">graph index</text>

<line x1="340" y1="404" x2="340" y2="428" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="160" y="430" width="360" height="36" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="452" text-anchor="middle" fill="#4A1B0C">Query engine → LLM → answer</text>
