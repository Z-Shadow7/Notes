<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="22" text-anchor="middle" fill="#2C2C2A">LCEL composition patterns</text>

<text font-family="sans-serif" font-size="12" x="40" y="46" fill="#5F5E5A">1. Sequential (pipe)</text>
<rect x="40" y="54" width="80" height="32" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="80" y="74" text-anchor="middle" fill="#26215C">prompt</text>
<line x1="120" y1="70" x2="136" y2="70" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="138" y="54" width="60" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="168" y="74" text-anchor="middle" fill="#412402">llm</text>
<line x1="198" y1="70" x2="214" y2="70" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="216" y="54" width="80" height="32" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="256" y="74" text-anchor="middle" fill="#085041">parser</text>
<text font-family="sans-serif" font-size="12" x="350" y="74" fill="#888780">linear — output of each feeds next</text>

<text font-family="sans-serif" font-size="12" x="40" y="112" fill="#5F5E5A">2. Parallel (dict)</text>
<rect x="40" y="120" width="80" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="80" y="140" text-anchor="middle" fill="#412402">input</text>
<line x1="120" y1="136" x2="138" y2="122" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="120" y1="136" x2="138" y2="152" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="140" y="106" width="100" height="28" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="190" y="124" text-anchor="middle" fill="#26215C">chain A</text>
<rect x="140" y="140" width="100" height="28" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="190" y="158" text-anchor="middle" fill="#085041">chain B</text>
<line x1="240" y1="120" x2="258" y2="136" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="240" y1="154" x2="258" y2="140" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="260" y="120" width="80" height="32" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="300" y="140" text-anchor="middle" fill="#4A1B0C">merged</text>
<text font-family="sans-serif" font-size="12" x="380" y="132" fill="#888780">runs simultaneously</text>
<text font-family="sans-serif" font-size="12" x="380" y="148" fill="#888780">merges into dict</text>

<text font-family="sans-serif" font-size="12" x="40" y="190" fill="#5F5E5A">3. Passthrough</text>
<rect x="40" y="198" width="80" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="80" y="218" text-anchor="middle" fill="#412402">input</text>
<line x1="120" y1="214" x2="138" y2="214" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="140" y="198" width="190" height="32" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="11" font-weight="500" x="235" y="218" text-anchor="middle" fill="#2C2C2A">{"q": passthrough, "ctx": retriever}</text>
<text font-family="sans-serif" font-size="12" x="360" y="218" fill="#888780">passes original input unchanged</text>

<text font-family="sans-serif" font-size="12" x="40" y="258" fill="#5F5E5A">4. Fallback</text>
<rect x="40" y="266" width="90" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="85" y="286" text-anchor="middle" fill="#412402">primary llm</text>
<line x1="130" y1="282" x2="148" y2="282" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="150" y="266" width="110" height="32" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="205" y="286" text-anchor="middle" fill="#2C2C2A">.with_fallbacks()</text>
<line x1="260" y1="282" x2="278" y2="282" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="280" y="266" width="100" height="32" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="330" y="286" text-anchor="middle" fill="#085041">backup llm</text>
<text font-family="sans-serif" font-size="12" x="420" y="286" fill="#888780">auto-retry on error</text>

<text font-family="sans-serif" font-size="12" x="40" y="326" fill="#5F5E5A">5. RunnableLambda</text>
<rect x="40" y="334" width="80" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="80" y="354" text-anchor="middle" fill="#412402">any step</text>
<line x1="120" y1="350" x2="138" y2="350" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="140" y="334" width="160" height="32" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="220" y="354" text-anchor="middle" fill="#4A1B0C">RunnableLambda(fn)</text>
<text font-family="sans-serif" font-size="12" x="330" y="354" fill="#888780">wrap any Python fn as a step</text>

<text font-family="sans-serif" font-size="12" x="40" y="394" fill="#5F5E5A">6. Conditional routing</text>
<rect x="40" y="402" width="80" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="80" y="422" text-anchor="middle" fill="#412402">input</text>
<line x1="120" y1="418" x2="138" y2="408" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="120" y1="418" x2="138" y2="432" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="140" y="396" width="120" height="24" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="11" font-weight="500" x="200" y="412" text-anchor="middle" fill="#26215C">if condition A</text>
<rect x="140" y="426" width="120" height="24" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="11" font-weight="500" x="200" y="442" text-anchor="middle" fill="#085041">if condition B</text>
<text font-family="sans-serif" font-size="12" x="290" y="416" fill="#888780">route to different chains</text>
<text font-family="sans-serif" font-size="12" x="290" y="436" fill="#888780">based on input content</text>

<text font-family="sans-serif" font-size="12" x="40" y="488" fill="#888780">All patterns are composable — mix and nest freely</text>
</svg>
