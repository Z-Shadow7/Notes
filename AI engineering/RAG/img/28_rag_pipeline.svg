<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-family="sans-serif" font-size="14" font-weight="500" x="40" y="28" fill="#2C2C2A">Phase 1 — index time (run once)</text>
<line x1="40" y1="36" x2="640" y2="36" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>

<rect x="40" y="48" width="110" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="95" y="68" text-anchor="middle" fill="#2C2C2A">Raw docs</text>
<text font-family="sans-serif" font-size="12" x="95" y="86" text-anchor="middle" fill="#5F5E5A">PDF, txt, HTML</text>

<line x1="150" y1="76" x2="178" y2="76" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="180" y="48" width="110" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="235" y="68" text-anchor="middle" fill="#2C2C2A">Chunker</text>
<text font-family="sans-serif" font-size="12" x="235" y="86" text-anchor="middle" fill="#5F5E5A">split + overlap</text>

<line x1="290" y1="76" x2="318" y2="76" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="320" y="48" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="385" y="68" text-anchor="middle" fill="#26215C">Embed model</text>
<text font-family="sans-serif" font-size="12" x="385" y="86" text-anchor="middle" fill="#3C3489">text → vector</text>

<line x1="450" y1="76" x2="478" y2="76" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="480" y="48" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="555" y="68" text-anchor="middle" fill="#085041">Vector DB</text>
<text font-family="sans-serif" font-size="12" x="555" y="86" text-anchor="middle" fill="#0F6E56">store + index</text>

<line x1="40" y1="136" x2="640" y2="136" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="40" y="160" fill="#2C2C2A">Phase 2 — query time (every request)</text>
<line x1="40" y1="168" x2="640" y2="168" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>

<rect x="40" y="180" width="120" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="100" y="200" text-anchor="middle" fill="#412402">User query</text>
<text font-family="sans-serif" font-size="12" x="100" y="218" text-anchor="middle" fill="#633806">"What is policy?"</text>

<line x1="160" y1="208" x2="188" y2="208" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="190" y="180" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="255" y="200" text-anchor="middle" fill="#26215C">Embed model</text>
<text font-family="sans-serif" font-size="12" x="255" y="218" text-anchor="middle" fill="#3C3489">query → vector</text>

<line x1="320" y1="208" x2="348" y2="208" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="350" y="180" width="130" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="415" y="200" text-anchor="middle" fill="#085041">Vector DB</text>
<text font-family="sans-serif" font-size="12" x="415" y="218" text-anchor="middle" fill="#0F6E56">retrieve top-K</text>

<line x1="480" y1="208" x2="508" y2="208" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="510" y="180" width="120" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="570" y="200" text-anchor="middle" fill="#4A1B0C">Groq LLM</text>
<text font-family="sans-serif" font-size="12" x="570" y="218" text-anchor="middle" fill="#712B13">generate answer</text>

<line x1="40" y1="268" x2="640" y2="268" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="40" y="292" fill="#2C2C2A">What goes into the LLM prompt</text>
<line x1="40" y1="300" x2="640" y2="300" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>

<rect x="40" y="312" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="130" y="332" text-anchor="middle" fill="#2C2C2A">System prompt</text>
<text font-family="sans-serif" font-size="12" x="130" y="350" text-anchor="middle" fill="#5F5E5A">role + instructions</text>

<rect x="234" y="312" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="344" y="332" text-anchor="middle" fill="#085041">Retrieved context</text>
<text font-family="sans-serif" font-size="12" x="344" y="350" text-anchor="middle" fill="#0F6E56">top-K chunks from vector DB</text>

<rect x="468" y="312" width="172" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="554" y="332" text-anchor="middle" fill="#412402">User question</text>
<text font-family="sans-serif" font-size="12" x="554" y="350" text-anchor="middle" fill="#633806">the original query</text>

<line x1="220" y1="380" x2="340" y2="408" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="344" y1="368" x2="344" y2="408" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="470" y1="380" x2="350" y2="408" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>

<rect x="240" y="410" width="200" height="36" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="432" text-anchor="middle" fill="#4A1B0C">Answer grounded in your data</text>
</svg>
