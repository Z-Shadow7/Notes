<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, sans-serif; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; fill: #888780; }
    .t-gray   { fill: #2C2C2A; } .s-gray   { fill: #5F5E5A; }
    .t-purple { fill: #26215C; } .s-purple { fill: #534AB7; }
    .t-teal   { fill: #04342C; } .s-teal   { fill: #0F6E56; }
    .t-amber  { fill: #412402; } .s-amber  { fill: #854F0B; }
    .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; }
    .box-teal   { fill: #E1F5EE; stroke: #0F6E56; }
    .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
  </style>
</defs>

<text class="ts" x="100" y="30" text-anchor="middle">Your code</text>
<text class="ts" x="340" y="30" text-anchor="middle">LLM API</text>
<text class="ts" x="580" y="30" text-anchor="middle">Tool / function</text>
<line x1="220" y1="20" x2="220" y2="340" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="460" y1="20" x2="460" y2="340" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>

<rect class="box-gray" x="30" y="50" width="170" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-gray" x="115" y="68" text-anchor="middle" dominant-baseline="central">1. Send message</text>
<text class="ts s-gray" x="115" y="86" text-anchor="middle" dominant-baseline="central">+ tool schemas</text>
<line x1="200" y1="76" x2="238" y2="76" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-purple" x="240" y="50" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-purple" x="340" y="68" text-anchor="middle" dominant-baseline="central">LLM reasons</text>
<text class="ts s-purple" x="340" y="86" text-anchor="middle" dominant-baseline="central">picks tool + fills args</text>
<line x1="340" y1="102" x2="340" y2="132" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-purple" x="240" y="134" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-purple" x="340" y="152" text-anchor="middle" dominant-baseline="central">Returns tool_use</text>
<text class="ts s-purple" x="340" y="170" text-anchor="middle" dominant-baseline="central">JSON: name + arguments</text>
<line x1="440" y1="160" x2="468" y2="160" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="240" y1="160" x2="202" y2="160" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-teal" x="30" y="134" width="170" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-teal" x="115" y="152" text-anchor="middle" dominant-baseline="central">2. Parse + execute</text>
<text class="ts s-teal" x="115" y="170" text-anchor="middle" dominant-baseline="central">run the function</text>

<rect class="box-teal" x="470" y="134" width="170" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-teal" x="555" y="152" text-anchor="middle" dominant-baseline="central">Tool executes</text>
<text class="ts s-teal" x="555" y="170" text-anchor="middle" dominant-baseline="central">returns result string</text>
<line x1="555" y1="186" x2="555" y2="215" stroke="#888780" stroke-width="1"/>
<line x1="555" y1="215" x2="205" y2="215" stroke="#888780" stroke-width="1"/>
<line x1="205" y1="215" x2="205" y2="190" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-gray" x="30" y="234" width="170" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-gray" x="115" y="252" text-anchor="middle" dominant-baseline="central">3. Send tool_result</text>
<text class="ts s-gray" x="115" y="270" text-anchor="middle" dominant-baseline="central">+ full history</text>
<line x1="200" y1="260" x2="238" y2="260" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-amber" x="240" y="234" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-amber" x="340" y="252" text-anchor="middle" dominant-baseline="central">LLM synthesises</text>
