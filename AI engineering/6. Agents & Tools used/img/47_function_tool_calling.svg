<rect class="box-amber" x="30" y="310" width="170" height="36" rx="8" stroke-width="0.5"/>
<text class="th t-amber" x="115" y="328" text-anchor="middle" dominant-baseline="central">Final answer</text>
<line x1="115" y1="310" x2="115" y2="288" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
