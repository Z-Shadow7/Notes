<svg width="100%" viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, sans-serif; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; fill: #888780; }
    .t-purple { fill: #26215C; } .s-purple { fill: #534AB7; }
    .t-teal   { fill: #04342C; } .s-teal   { fill: #0F6E56; }
    .t-coral  { fill: #4A1B0C; } .s-coral  { fill: #993C1D; }
    .t-amber  { fill: #412402; } .s-amber  { fill: #854F0B; }
    .t-gray   { fill: #2C2C2A; } .s-gray   { fill: #5F5E5A; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; }
    .box-teal   { fill: #E1F5EE; stroke: #0F6E56; }
    .box-coral  { fill: #FAECE7; stroke: #993C1D; }
    .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
    .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
  </style>
</defs>

<text class="ts" x="110" y="28" text-anchor="middle">Reason</text>
<text class="ts" x="340" y="28" text-anchor="middle">Act</text>
<text class="ts" x="570" y="28" text-anchor="middle">Observe</text>
<line x1="225" y1="15" x2="225" y2="415" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="455" y1="15" x2="455" y2="415" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>

<rect class="box-purple" x="30" y="45" width="185" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-purple" x="123" y="63" text-anchor="middle" dominant-baseline="central">Thought 1</text>
<text class="ts s-purple" x="123" y="81" text-anchor="middle" dominant-baseline="central">decide what to do next</text>
<line x1="215" y1="71" x2="243" y2="71" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-teal" x="245" y="45" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-teal" x="345" y="63" text-anchor="middle" dominant-baseline="central">Action 1</text>
<text class="ts s-teal" x="345" y="81" text-anchor="middle" dominant-baseline="central">call tool with args</text>
<line x1="445" y1="71" x2="463" y2="71" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-coral" x="465" y="45" width="185" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-coral" x="558" y="63" text-anchor="middle" dominant-baseline="central">Observation 1</text>
<text class="ts s-coral" x="558" y="81" text-anchor="middle" dominant-baseline="central">tool result returned</text>
<path d="M558 97 L558 115 L123 115 L123 97" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<rect class="box-purple" x="30" y="130" width="185" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-purple" x="123" y="148" text-anchor="middle" dominant-baseline="central">Thought 2</text>
<text class="ts s-purple" x="123" y="166" text-anchor="middle" dominant-baseline="central">update plan with result</text>
<line x1="215" y1="156" x2="243" y2="156" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-teal" x="245" y="130" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-teal" x="345" y="148" text-anchor="middle" dominant-baseline="central">Action 2</text>
<text class="ts s-teal" x="345" y="166" text-anchor="middle" dominant-baseline="central">different tool or same</text>
<line x1="445" y1="156" x2="463" y2="156" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-coral" x="465" y="130" width="185" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-coral" x="558" y="148" text-anchor="middle" dominant-baseline="central">Observation 2</text>
<text class="ts s-coral" x="558" y="166" text-anchor="middle" dominant-baseline="central">appended to history</text>
<path d="M558 182 L558 200 L123 200 L123 182" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<text class="ts" x="340" y="228" text-anchor="middle">... repeats until goal is met ...</text>

<rect class="box-purple" x="30" y="248" width="185" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-purple" x="123" y="266" text-anchor="middle" dominant-baseline="central">Thought N</text>
<text class="ts s-purple" x="123" y="284" text-anchor="middle" dominant-baseline="central">I now know the answer</text>
<line x1="215" y1="274" x2="243" y2="274" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-amber" x="245" y="248" width="200" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-amber" x="345" y="266" text-anchor="middle" dominant-baseline="central">Final Answer</text>
<text class="ts s-amber" x="345" y="284" text-anchor="middle" dominant-baseline="central">no Action — text only</text>
<line x1="445" y1="274" x2="463" y2="274" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-gray" x="465" y="248" width="185" height="52" rx="8" stroke-width="0.5"/>
<text class="th t-gray" x="558" y="266" text-anchor="middle" dominant-baseline="central">User gets answer</text>
<text class="ts s-gray" x="558" y="284" text-anchor="middle" dominant-baseline="central">loop exits</text>

<rect x="30" y="330" width="620" height="36" rx="6" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" x="340" y="352" text-anchor="middle">agent_scratchpad — full history fed back each iteration</text>
</svg>
