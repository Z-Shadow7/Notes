<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, sans-serif; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; fill: #888780; }
    .t-gray   { fill: #2C2C2A; } .s-gray   { fill: #5F5E5A; }
    .t-purple { fill: #26215C; } .s-purple { fill: #534AB7; }
    .t-teal   { fill: #04342C; } .s-teal   { fill: #0F6E56; }
    .t-coral  { fill: #4A1B0C; } .s-coral  { fill: #993C1D; }
    .t-amber  { fill: #412402; } .s-amber  { fill: #854F0B; }
    .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; }
    .box-teal   { fill: #E1F5EE; stroke: #0F6E56; }
    .box-coral  { fill: #FAECE7; stroke: #993C1D; }
    .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
  </style>
</defs>

<rect class="box-gray" x="30" y="170" width="100" height="44" rx="8" stroke-width="0.5"/>
<text class="th t-gray" x="80" y="192" text-anchor="middle" dominant-baseline="central">Goal</text>
<line x1="130" y1="192" x2="158" y2="192" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-purple" x="160" y="155" width="140" height="74" rx="8" stroke-width="0.5"/>
<text class="th t-purple" x="230" y="178" text-anchor="middle" dominant-baseline="central">Think</text>
<text class="ts s-purple" x="230" y="196" text-anchor="middle" dominant-baseline="central">reason over goal</text>
<text class="ts s-purple" x="230" y="212" text-anchor="middle" dominant-baseline="central">+ history + tools</text>

<path d="M230 155 L230 100 L550 100 L550 155" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="390" y="90" text-anchor="middle">final answer</text>
<line x1="300" y1="192" x2="328" y2="192" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-teal" x="330" y="155" width="140" height="74" rx="8" stroke-width="0.5"/>
<text class="th t-teal" x="400" y="178" text-anchor="middle" dominant-baseline="central">Act</text>
<text class="ts s-teal" x="400" y="196" text-anchor="middle" dominant-baseline="central">call chosen tool</text>
<text class="ts s-teal" x="400" y="212" text-anchor="middle" dominant-baseline="central">with LLM args</text>
<line x1="400" y1="229" x2="400" y2="258" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect class="box-coral" x="330" y="260" width="140" height="74" rx="8" stroke-width="0.5"/>
<text class="th t-coral" x="400" y="283" text-anchor="middle" dominant-baseline="central">Observe</text>
<text class="ts s-coral" x="400" y="301" text-anchor="middle" dominant-baseline="central">read tool output</text>
<text class="ts s-coral" x="400" y="317" text-anchor="middle" dominant-baseline="central">append to history</text>

<path d="M330 297 L230 297 L230 229" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="270" y="320" text-anchor="middle">loop</text>

<rect class="box-amber" x="480" y="155" width="160" height="74" rx="8" stroke-width="0.5"/>
<text class="th t-amber" x="560" y="178" text-anchor="middle" dominant-baseline="central">Final answer</text>
<text class="ts s-amber" x="560" y="196" text-anchor="middle" dominant-baseline="central">returned to user</text>
<text class="ts s-amber" x="560" y="212" text-anchor="middle" dominant-baseline="central">loop exits</text>

<rect x="330" y="360" width="140" height="30" rx="6" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="400" y="379" text-anchor="middle">search · code · DB · API...</text>
<line x1="400" y1="360" x2="400" y2="334" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<text class="ts" x="230" y="360" text-anchor="middle">Memory</text>
<text class="ts" x="230" y="376" text-anchor="middle">(context window)</text>
<line x1="230" y1="350" x2="230" y2="232" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
</svg>
