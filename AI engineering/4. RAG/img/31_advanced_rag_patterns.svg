<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="24" text-anchor="middle" fill="#2C2C2A">5 advanced RAG patterns — what each fixes</text>

<rect x="220" y="40" width="240" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="64" text-anchor="middle" fill="#2C2C2A">Naive RAG — retrieve → stuff → generate</text>

<line x1="60" y1="80" x2="620" y2="80" stroke="#B4B2A9" stroke-width="0.8"/>
<line x1="100" y1="80" x2="100" y2="108" stroke="#B4B2A9" stroke-width="0.8"/>
<line x1="220" y1="80" x2="220" y2="108" stroke="#B4B2A9" stroke-width="0.8"/>
<line x1="340" y1="80" x2="340" y2="108" stroke="#B4B2A9" stroke-width="0.8"/>
<line x1="460" y1="80" x2="460" y2="108" stroke="#B4B2A9" stroke-width="0.8"/>
<line x1="580" y1="80" x2="580" y2="108" stroke="#B4B2A9" stroke-width="0.8"/>

<rect x="40" y="110" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="100" y="132" text-anchor="middle" fill="#26215C">Sentence</text>
<text font-family="sans-serif" font-size="13" font-weight="500" x="100" y="148" text-anchor="middle" fill="#26215C">window</text>
<text font-family="sans-serif" font-size="11" x="100" y="162" text-anchor="middle" fill="#3C3489">fixes: lost context</text>

<rect x="170" y="110" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="230" y="132" text-anchor="middle" fill="#085041">Parent-child</text>
<text font-family="sans-serif" font-size="13" font-weight="500" x="230" y="148" text-anchor="middle" fill="#085041">retrieval</text>
<text font-family="sans-serif" font-size="11" x="230" y="162" text-anchor="middle" fill="#0F6E56">fixes: chunk boundary</text>

<rect x="300" y="110" width="120" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="360" y="132" text-anchor="middle" fill="#4A1B0C">Step-back</text>
<text font-family="sans-serif" font-size="13" font-weight="500" x="360" y="148" text-anchor="middle" fill="#4A1B0C">prompting</text>
<text font-family="sans-serif" font-size="11" x="360" y="162" text-anchor="middle" fill="#712B13">fixes: narrow queries</text>

<rect x="430" y="110" width="120" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="490" y="132" text-anchor="middle" fill="#412402">RAPTOR</text>
<text font-family="sans-serif" font-size="13" font-weight="500" x="490" y="148" text-anchor="middle" fill="#412402">tree index</text>
<text font-family="sans-serif" font-size="11" x="490" y="162" text-anchor="middle" fill="#633806">fixes: multi-doc queries</text>

<rect x="560" y="110" width="100" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="610" y="132" text-anchor="middle" fill="#042C53">Self-RAG</text>
<text font-family="sans-serif" font-size="11" x="610" y="150" text-anchor="middle" fill="#0C447C">model decides</text>
<text font-family="sans-serif" font-size="11" x="610" y="163" text-anchor="middle" fill="#0C447C">when to retrieve</text>

<line x1="40" y1="200" x2="640" y2="200" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="40" y="222" fill="#2C2C2A">Pattern details</text>

<rect x="40" y="234" width="290" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="185" y="252" text-anchor="middle" fill="#26215C">Sentence window retrieval</text>
<text font-family="sans-serif" font-size="11" x="185" y="268" text-anchor="middle" fill="#3C3489">retrieve small chunk, send surrounding window to LLM</text>
<text font-family="sans-serif" font-size="11" x="185" y="282" text-anchor="middle" fill="#3C3489">precision in retrieval, full context in generation</text>

<rect x="350" y="234" width="290" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="495" y="252" text-anchor="middle" fill="#085041">Parent-child retrieval</text>
<text font-family="sans-serif" font-size="11" x="495" y="268" text-anchor="middle" fill="#0F6E56">index small child chunks, store large parent chunks</text>
<text font-family="sans-serif" font-size="11" x="495" y="282" text-anchor="middle" fill="#0F6E56">match via child, return parent to LLM</text>

<rect x="40" y="304" width="290" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="185" y="322" text-anchor="middle" fill="#4A1B0C">Step-back prompting</text>
<text font-family="sans-serif" font-size="11" x="185" y="338" text-anchor="middle" fill="#712B13">rewrite query as a broader step-back question</text>
<text font-family="sans-serif" font-size="11" x="185" y="352" text-anchor="middle" fill="#712B13">retrieves higher-level context first</text>

<rect x="350" y="304" width="290" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="495" y="322" text-anchor="middle" fill="#412402">RAPTOR tree index</text>
<text font-family="sans-serif" font-size="11" x="495" y="338" text-anchor="middle" fill="#633806">summarise clusters of chunks into parent nodes</text>
<text font-family="sans-serif" font-size="11" x="495" y="352" text-anchor="middle" fill="#633806">query can match at any level of the tree</text>

<rect x="40" y="374" width="600" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="340" y="392" text-anchor="middle" fill="#042C53">Self-RAG</text>
<text font-family="sans-serif" font-size="11" x="340" y="410" text-anchor="middle" fill="#0C447C">model uses special tokens to decide: retrieve now? is this passage relevant? is my answer grounded?</text>
</svg>
