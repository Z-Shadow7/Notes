<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="240" y="20" width="200" height="40" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="44" text-anchor="middle" fill="#412402">User query</text>

<line x1="280" y1="60" x2="160" y2="98" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="400" y1="60" x2="520" y2="98" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="60" y="100" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="160" y="118" text-anchor="middle" fill="#26215C">Dense retrieval</text>
<text font-family="sans-serif" font-size="12" x="160" y="136" text-anchor="middle" fill="#3C3489">embed → cosine similarity</text>
<text font-family="sans-serif" font-size="12" x="160" y="150" text-anchor="middle" fill="#3C3489">finds semantic matches</text>

<rect x="420" y="100" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="520" y="118" text-anchor="middle" fill="#085041">Sparse retrieval</text>
<text font-family="sans-serif" font-size="12" x="520" y="136" text-anchor="middle" fill="#0F6E56">BM25 → term frequency</text>
<text font-family="sans-serif" font-size="12" x="520" y="150" text-anchor="middle" fill="#0F6E56">finds exact keyword matches</text>

<text font-family="sans-serif" font-size="11" x="60" y="178" text-anchor="middle" fill="#888780">"send item back"</text>
<text font-family="sans-serif" font-size="11" x="60" y="192" text-anchor="middle" fill="#888780">→ finds "return policy"</text>
<text font-family="sans-serif" font-size="11" x="520" y="178" text-anchor="middle" fill="#888780">"invoice #A1234"</text>
<text font-family="sans-serif" font-size="11" x="520" y="192" text-anchor="middle" fill="#888780">→ exact match only</text>

<line x1="160" y1="156" x2="280" y2="218" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="520" y1="156" x2="400" y2="218" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="190" y="220" width="300" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="238" text-anchor="middle" fill="#4A1B0C">Score fusion</text>
<text font-family="sans-serif" font-size="12" x="340" y="256" text-anchor="middle" fill="#712B13">RRF or weighted sum</text>
<text font-family="sans-serif" font-size="12" x="340" y="270" text-anchor="middle" fill="#712B13">score = α × dense + (1−α) × sparse</text>

<line x1="340" y1="276" x2="340" y2="310" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="190" y="312" width="300" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="332" text-anchor="middle" fill="#2C2C2A">Re-ranked results → LLM</text>
<text font-family="sans-serif" font-size="12" x="340" y="348" text-anchor="middle" fill="#5F5E5A">best of both worlds</text>
</svg>
