<text font-family="sans-serif" font-size="14" font-weight="500" x="230" y="62" text-anchor="middle" fill="#2C2C2A">Document</text>

<line x1="90" y1="76" x2="90" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="230" y1="76" x2="230" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="40" y="110" width="100" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="90" y="128" text-anchor="middle" fill="#26215C">Encoder</text>
<text font-family="sans-serif" font-size="11" x="90" y="144" text-anchor="middle" fill="#3C3489">independent</text>
<rect x="160" y="110" width="140" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="230" y="128" text-anchor="middle" fill="#26215C">Encoder</text>
<text font-family="sans-serif" font-size="11" x="230" y="144" text-anchor="middle" fill="#3C3489">independent</text>

<line x1="90" y1="154" x2="90" y2="186" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="230" y1="154" x2="230" y2="186" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

