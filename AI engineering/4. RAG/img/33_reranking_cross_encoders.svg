    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-family="sans-serif" font-size="14" font-weight="500" x="160" y="24" text-anchor="middle" fill="#2C2C2A">Bi-encoder (retrieval)</text>
<text font-family="sans-serif" font-size="14" font-weight="500" x="510" y="24" text-anchor="middle" fill="#2C2C2A">Cross-encoder (re-ranking)</text>
<line x1="340" y1="16" x2="340" y2="380" stroke="#B4B2A9" stroke-width="0.5"/>

