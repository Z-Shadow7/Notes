<rect x="160" y="188" width="140" height="36" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" x="230" y="210" text-anchor="middle" fill="#085041">[0.5, 0.1…]</text>

<line x1="90" y1="224" x2="160" y2="256" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="230" y1="224" x2="190" y2="256" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="100" y="258" width="160" height="36" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="180" y="280" text-anchor="middle" fill="#4A1B0C">cosine similarity</text>

<text font-family="sans-serif" font-size="11" x="180" y="318" text-anchor="middle" fill="#888780">fast — docs pre-embedded</text>
<text font-family="sans-serif" font-size="11" x="180" y="334" text-anchor="middle" fill="#888780">approximate — no cross-attention</text>
<text font-family="sans-serif" font-size="11" x="180" y="350" text-anchor="middle" fill="#888780">scales to millions of docs</text>

<rect x="370" y="40" width="240" height="36" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="490" y="62" text-anchor="middle" fill="#412402">[Query] [SEP] [Document]</text>

<line x1="490" y1="76" x2="490" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="370" y="110" width="240" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="490" y="130" text-anchor="middle" fill="#26215C">Transformer</text>
<text font-family="sans-serif" font-size="11" x="490" y="148" text-anchor="middle" fill="#3C3489">full cross-attention between</text>
<text font-family="sans-serif" font-size="11" x="490" y="162" text-anchor="middle" fill="#3C3489">query and document tokens</text>

<line x1="490" y1="166" x2="490" y2="198" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="400" y="200" width="180" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="490" y="218" text-anchor="middle" fill="#4A1B0C">Relevance score</text>
<text font-family="sans-serif" font-size="11" x="490" y="236" text-anchor="middle" fill="#712B13">single float, e.g. 8.42</text>

<text font-family="sans-serif" font-size="11" x="490" y="290" text-anchor="middle" fill="#888780">slow — runs per (query, doc) pair</text>
<text font-family="sans-serif" font-size="11" x="490" y="306" text-anchor="middle" fill="#888780">highly accurate — sees both together</text>
<text font-family="sans-serif" font-size="11" x="490" y="322" text-anchor="middle" fill="#888780">only run on top 10–20 candidates</text>
