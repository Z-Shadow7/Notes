<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="24" text-anchor="middle" fill="#2C2C2A">Production RAG pipeline — 7 stages</text>

<rect x="40" y="40" width="180" height="52" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="130" y="60" text-anchor="middle" fill="#412402">1. Query understanding</text>
<text font-family="sans-serif" font-size="12" x="130" y="78" text-anchor="middle" fill="#633806">clean, expand, classify</text>

<line x1="220" y1="66" x2="248" y2="66" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="250" y="40" width="180" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="60" text-anchor="middle" fill="#26215C">2. Retrieval</text>
<text font-family="sans-serif" font-size="12" x="340" y="78" text-anchor="middle" fill="#3C3489">embed + vector search</text>

<line x1="430" y1="66" x2="458" y2="66" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="460" y="40" width="180" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="550" y="60" text-anchor="middle" fill="#085041">3. Re-ranking</text>
<text font-family="sans-serif" font-size="12" x="550" y="78" text-anchor="middle" fill="#0F6E56">reorder by relevance</text>

<line x1="550" y1="92" x2="550" y2="118" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="460" y="120" width="180" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="550" y="140" text-anchor="middle" fill="#085041">4. Context assembly</text>
<text font-family="sans-serif" font-size="12" x="550" y="158" text-anchor="middle" fill="#0F6E56">format + truncate</text>

<line x1="460" y1="146" x2="432" y2="146" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="250" y="120" width="180" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="140" text-anchor="middle" fill="#26215C">5. Prompt construction</text>
<text font-family="sans-serif" font-size="12" x="340" y="158" text-anchor="middle" fill="#3C3489">system + context + query</text>

<line x1="250" y1="146" x2="222" y2="146" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="40" y="120" width="180" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="130" y="140" text-anchor="middle" fill="#4A1B0C">6. Generation</text>
<text font-family="sans-serif" font-size="12" x="130" y="158" text-anchor="middle" fill="#712B13">LLM call via Groq</text>

<line x1="130" y1="172" x2="130" y2="198" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="40" y="200" width="180" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="130" y="220" text-anchor="middle" fill="#2C2C2A">7. Post-processing</text>
<text font-family="sans-serif" font-size="12" x="130" y="238" text-anchor="middle" fill="#5F5E5A">citations, guard, format</text>

<line x1="40" y1="276" x2="640" y2="276" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="40" y="298" fill="#2C2C2A">Where things go wrong</text>

<rect x="40" y="310" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="130" y="328" text-anchor="middle" fill="#412402">Bad retrieval</text>
<text font-family="sans-serif" font-size="12" x="130" y="346" text-anchor="middle" fill="#633806">wrong chunks fetched</text>
<text font-family="sans-serif" font-size="12" x="130" y="360" text-anchor="middle" fill="#633806">→ fix chunk size / embed</text>

<rect x="250" y="310" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="328" text-anchor="middle" fill="#26215C">Context overflow</text>
<text font-family="sans-serif" font-size="12" x="340" y="346" text-anchor="middle" fill="#3C3489">too much text</text>
<text font-family="sans-serif" font-size="12" x="340" y="360" text-anchor="middle" fill="#3C3489">→ re-rank, trim to top 3</text>

<rect x="460" y="310" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="550" y="328" text-anchor="middle" fill="#4A1B0C">Hallucination</text>
<text font-family="sans-serif" font-size="12" x="550" y="346" text-anchor="middle" fill="#712B13">model ignores context</text>
<text font-family="sans-serif" font-size="12" x="550" y="360" text-anchor="middle" fill="#712B13">→ fix system prompt</text>

<rect x="40" y="390" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="130" y="408" text-anchor="middle" fill="#2C2C2A">Stale data</text>
<text font-family="sans-serif" font-size="12" x="130" y="426" text-anchor="middle" fill="#5F5E5A">old docs still in index</text>
<text font-family="sans-serif" font-size="12" x="130" y="440" text-anchor="middle" fill="#5F5E5A">→ add year filter / TTL</text>

<rect x="250" y="390" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="408" text-anchor="middle" fill="#2C2C2A">No answer found</text>
<text font-family="sans-serif" font-size="12" x="340" y="426" text-anchor="middle" fill="#5F5E5A">context has nothing relevant</text>
<text font-family="sans-serif" font-size="12" x="340" y="440" text-anchor="middle" fill="#5F5E5A">→ threshold + fallback msg</text>

<rect x="460" y="390" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="550" y="408" text-anchor="middle" fill="#2C2C2A">Slow response</text>
<text font-family="sans-serif" font-size="12" x="550" y="426" text-anchor="middle" fill="#5F5E5A">embed + retrieve + LLM</text>
<text font-family="sans-serif" font-size="12" x="550" y="440" text-anchor="middle" fill="#5F5E5A">→ cache embed queries</text>
</svg>
