<svg width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="24" text-anchor="middle" fill="#2C2C2A">Standard RAG vs Agentic RAG</text>

<text font-family="sans-serif" font-size="12" x="130" y="52" text-anchor="middle" fill="#888780">Standard RAG — fixed pipeline</text>
<rect x="40" y="60" width="90" height="36" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="85" y="82" text-anchor="middle" fill="#412402">Query</text>
<line x1="130" y1="78" x2="148" y2="78" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="150" y="60" width="90" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="195" y="82" text-anchor="middle" fill="#26215C">Retrieve</text>
<line x1="240" y1="78" x2="258" y2="78" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="260" y="60" width="90" height="36" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" x="305" y="82" text-anchor="middle" fill="#4A1B0C">Generate</text>
<text font-family="sans-serif" font-size="11" x="195" y="114" text-anchor="middle" fill="#888780">one shot — no iteration</text>

<line x1="370" y1="30" x2="370" y2="440" stroke="#B4B2A9" stroke-width="0.5"/>

<text font-family="sans-serif" font-size="12" x="525" y="52" text-anchor="middle" fill="#888780">Agentic RAG — agent loop</text>

<rect x="400" y="60" width="120" height="40" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="460" y="84" text-anchor="middle" fill="#412402">User question</text>

<line x1="460" y1="100" x2="460" y2="128" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="390" y="130" width="260" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="520" y="150" text-anchor="middle" fill="#26215C">LLM — think</text>
<text font-family="sans-serif" font-size="12" x="520" y="168" text-anchor="middle" fill="#3C3489">do I need to search? what query?</text>

<line x1="520" y1="182" x2="600" y2="210" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" x="614" y="208" fill="#888780">search</text>

<rect x="440" y="212" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="520" y="230" text-anchor="middle" fill="#085041">Vector DB</text>
<text font-family="sans-serif" font-size="12" x="520" y="246" text-anchor="middle" fill="#0F6E56">retrieve chunks</text>

<path d="M 440 234 Q 390 234 390 182" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="11" x="372" y="216" text-anchor="end" fill="#888780">results</text>

<line x1="460" y1="278" x2="460" y2="308" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="3 2"/>
<text font-family="sans-serif" font-size="11" x="530" y="296" fill="#888780">loop N times</text>

<rect x="390" y="310" width="260" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="520" y="330" text-anchor="middle" fill="#26215C">LLM — enough context?</text>
<text font-family="sans-serif" font-size="12" x="520" y="348" text-anchor="middle" fill="#3C3489">yes → generate  |  no → search again</text>

<line x1="520" y1="362" x2="520" y2="392" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="410" y="394" width="220" height="36" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="520" y="416" text-anchor="middle" fill="#4A1B0C">Final grounded answer</text>
</svg>
